<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway Authentication — Enterprise Terminal Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { darkBg: '#090a0f', darkCard: '#12141c', accentNeon: '#38bdf8', accentPurple: '#818cf8', accentEmerald: '#10b981' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>.smooth-transition { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }</style>
</head>
<body class="font-sans text-slate-300 bg-darkBg antialiased min-h-screen flex items-center justify-center p-4 selection:bg-accentNeon selection:text-darkBg">

    <div class="w-full max-w-5xl bg-darkCard border border-white/5 rounded-[32px] overflow-hidden grid grid-cols-1 lg:grid-cols-12 min-h-[640px]">
        
        <!-- LEFT SCREEN: APP INFO INTERFACE (5 COLS) -->
        <div class="lg:col-span-5 bg-gradient-to-br from-darkCard to-black p-8 lg:p-12 flex flex-col justify-between border-r border-white/5 relative overflow-hidden">
            <div class="absolute -top-24 -left-24 w-80 h-80 bg-accentPurple/10 rounded-full blur-3xl"></div>
            
            <div class="z-10">
                <span class="font-mono text-[11px] tracking-widest text-accentNeon uppercase">// TERMINAL CORE v2.4</span>
                <h2 class="text-2xl font-extrabold text-white mt-4 tracking-tight leading-tight">Unified Retail Operations & Inventory Vector</h2>
            </div>

            <div class="z-10 font-mono text-[10px] text-slate-500 space-y-2 border-t border-white/5 pt-6">
                <p class="flex justify-between"><span>SSL NODE STATUS:</span> <span class="text-accentEmerald">ENCRYPTED</span></p>
                <p class="flex justify-between"><span>PERIPHERAL ARRAY:</span> <span class="text-white">QR ACTIVE</span></p>
            </div>
        </div>

        <!-- RIGHT SCREEN: AUTH FORM INPUT PANEL (7 COLS) -->
        <div class="lg:col-span-7 p-8 lg:p-16 flex flex-col justify-center bg-darkCard/50">
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-white tracking-tight">Operator Authentication</h1>
                <p class="text-xs text-slate-400 font-light mt-1">Input assigned cryptographic terminal credentials to mount active session.</p>
            </div>

            <form class="space-y-5" onsubmit="event.preventDefault(); window.location.href='index.html';">
                <div>
                    <label class="block text-xs font-mono uppercase tracking-wider text-slate-500 mb-2">// Operator Badge Identifier</label>
                    <input type="text" placeholder="ops.thorne@enterprise.io" required class="w-full bg-darkBg border border-white/5 rounded-xl px-4 h-12 text-sm text-white focus:outline-none focus:border-accentNeon smooth-transition">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-xs font-mono uppercase tracking-wider text-slate-500">// Terminal Access Token</label>
                        <a href="#" class="font-mono text-[10px] text-accentPurple hover:text-white smooth-transition">Reset Token?</a>
                    </div>
                    <input type="password" placeholder="••••••••••••" required class="w-full bg-darkBg border border-white/5 rounded-xl px-4 h-12 text-sm text-white focus:outline-none focus:border-accentNeon smooth-transition">
                </div>

                <div class="flex items-center justify-between pt-2">
                    <label class="flex items-center space-x-2 font-mono text-[11px] text-slate-400 cursor-pointer select-none">
                        <input type="checkbox" class="rounded bg-darkBg border-white/5 text-accentNeon focus:ring-0 w-4 h-4">
                        <span>Keep Terminal Session Mounted</span>
                    </label>
                </div>

                <button type="submit" class="w-full bg-accentNeon text-darkBg text-xs font-mono font-bold tracking-widest uppercase h-12 rounded-xl hover:bg-white smooth-transition mt-4">
                    Mount System Console
                </button>
            </form>
        </div>
    </div>

</body>
</html>
